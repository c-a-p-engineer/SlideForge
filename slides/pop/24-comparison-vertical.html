<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pop Comparison Vertical</title>
    <style>
      @page {
        size: 1920px 1080px;
        margin: 0;
      }
    </style>
    <link rel="stylesheet" href="../templates/base/base.css" />
    <link rel="stylesheet" href="../templates/pop/theme.css" />
  </head>
  <body>
    <main class="slide" data-slide-type="comparison" data-slide-variant="vertical">
      <div class="slide__shell">
        <header class="slide__header">
          <div class="brand">SlideForge / Pop</div>
          <div class="slide-id">Comparison V</div>
        </header>
        <section class="slide__body">
          <p class="kicker">このページは何用か</p>
          <h1 class="title">観点ごとの比較を縦積みで見せる comparison-vertical ページ</h1>
          <p class="purpose-note">用途: 評価軸が多い比較を読みやすくする</p>
          <div class="card-stack">
            <div class="compare-card">
              <span class="compare-card__tag">観点 1</span>
              <h3>作成速度</h3>
              <p>初稿を速く揃えられるかを見る比較観点です。</p>
            </div>
            <div class="compare-card">
              <span class="compare-card__tag">観点 2</span>
              <h3>レビュー容易性</h3>
              <p>コメントが集約されるかを見る比較観点です。</p>
            </div>
            <div class="compare-card">
              <span class="compare-card__tag">観点 3</span>
              <h3>再利用性</h3>
              <p>過去資産を使い回せるかを見る比較観点です。</p>
            </div>
          </div>
        </section>
        <footer class="slide__footer">
          <span>slides/pop/24-comparison-vertical.html</span>
          <span class="page-number">24 / 35</span>
        </footer>
      </div>
    </main>
  </body>
</html>
