<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pop Scope</title>
    <style>
      @page {
        size: 1920px 1080px;
        margin: 0;
      }
    </style>
    <link rel="stylesheet" href="../templates/base/base.css" />
    <link rel="stylesheet" href="../templates/pop/theme.css" />
  </head>
  <body>
    <main class="slide" data-slide-type="decision" data-slide-variant="default">
      <div class="slide__shell">
        <header class="slide__header">
          <div class="brand">SlideForge / Pop</div>
          <div class="slide-id">Scope</div>
        </header>
        <section class="slide__body">
          <p class="kicker">このページは何用か</p>
          <h1 class="title">対象範囲と対象外を先に決める scope ページ</h1>
          <p class="purpose-note">用途: 議論の広がりすぎを防ぐ</p>
          <div class="compare-grid">
            <div class="compare-card">
              <span class="compare-card__tag">In Scope</span>
              <ul>
                <li>今回の資料で決めること</li>
                <li>今回検証する対象</li>
                <li>今期中に触る範囲</li>
              </ul>
            </div>
            <div class="compare-card">
              <span class="compare-card__tag">Out Of Scope</span>
              <ul>
                <li>今回は決めないこと</li>
                <li>別案件で扱う内容</li>
                <li>長期課題として残す項目</li>
              </ul>
            </div>
          </div>
        </section>
        <footer class="slide__footer">
          <span>slides/pop/04-scope.html</span>
          <span class="page-number">04 / 35</span>
        </footer>
      </div>
    </main>
  </body>
</html>
