<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pop Next Action</title>
    <style>
      @page {
        size: 1920px 1080px;
        margin: 0;
      }
    </style>
    <link rel="stylesheet" href="../base.css" />
    <link rel="stylesheet" href="./theme.css" />
  </head>
  <body>
    <main class="slide" data-slide-type="action" data-slide-variant="default">
      <div class="slide__shell">
        <header class="slide__header">
          <div class="brand">SlideForge / Pop</div>
          <div class="slide-id">Next Action</div>
        </header>
        <section class="slide__body">
          <p class="kicker">このページは何用か</p>
          <h1 class="title">担当、期限、成果物を示す next-action ページ</h1>
          <p class="purpose-note">用途: 資料を読んだあとに何をするかを明確にする</p>
          <div class="action-grid">
            <div class="compare-card">
              <span class="compare-card__tag">Action</span>
              <ul class="action-list">
                <li>試行案件を選ぶ</li>
                <li>レビュー観点を整える</li>
                <li>運用ルールを共有する</li>
              </ul>
            </div>
            <div class="table-card">
              <table>
                <thead>
                  <tr>
                    <th>Owner</th>
                    <th>Task</th>
                    <th>Due</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>PM</td>
                    <td>対象案件の選定</td>
                    <td>4/05</td>
                  </tr>
                  <tr>
                    <td>Design</td>
                    <td>レビュー観点整理</td>
                    <td>4/08</td>
                  </tr>
                  <tr>
                    <td>Eng</td>
                    <td>出力確認</td>
                    <td>4/10</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </section>
        <footer class="slide__footer">
          <span>slides/pop/17-next-action.html</span>
          <span class="page-number">17 / 35</span>
        </footer>
      </div>
    </main>
  </body>
</html>
