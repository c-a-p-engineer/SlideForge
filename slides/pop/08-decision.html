<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pop Decision</title>
    <style>
      @page {
        size: 1920px 1080px;
        margin: 0;
      }
    </style>
    <link rel="stylesheet" href="../templates/base/base.css" />
    <link rel="stylesheet" href="../templates/pop/theme.css" />
  </head>
  <body>
    <main class="slide" data-slide-type="decision" data-slide-variant="default">
      <div class="slide__shell">
        <header class="slide__header">
          <div class="brand">SlideForge / Pop</div>
          <div class="slide-id">Decision</div>
        </header>
        <section class="slide__body">
          <p class="kicker">このページは何用か</p>
          <h1 class="title">最終的に何を決めたいかを明文化する decision ページ</h1>
          <p class="purpose-note">用途: 会議の着地点を曖昧にしない</p>
          <div class="section-grid">
            <div class="decision-card">
              <h3>記載すること</h3>
              <ul class="decision-list">
                <li>採用する方針</li>
                <li>今決めること / 後で決めること</li>
                <li>判断基準</li>
              </ul>
            </div>
            <div class="callout-card">
              <h3>使いどころ</h3>
              <p>比較や evidence の後に置き、結論に向かう流れを止めずに意思決定へつなげたいときに使います。</p>
            </div>
          </div>
        </section>
        <footer class="slide__footer">
          <span>slides/pop/08-decision.html</span>
          <span class="page-number">08 / 35</span>
        </footer>
      </div>
    </main>
  </body>
</html>
