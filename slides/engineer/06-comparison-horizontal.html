<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Engineer Comparison Horizontal</title>
    <style>
      @page {
        size: 1920px 1080px;
        margin: 0;
      }
    </style>
    <link rel="stylesheet" href="../base.css" />
    <link rel="stylesheet" href="./theme.css" />
  </head>
  <body>
    <main class="slide" data-slide-type="comparison" data-slide-variant="horizontal">
      <div class="slide__shell">
        <header class="slide__header">
          <div class="brand">SlideForge / Engineer</div>
          <div class="slide-id">Comparison H</div>
        </header>
        <section class="slide__body">
          <p class="kicker">このページは何用か</p>
          <h1 class="title">2案を左右に比較する comparison-horizontal ページ</h1>
          <p class="purpose-note">用途: 選択肢が 2 つのときに短時間で比較させる</p>
          <div class="compare-grid">
            <div class="compare-card">
              <span class="compare-card__tag">Left Option</span>
              <h3>左側に置く内容</h3>
              <ul>
                <li>案 A の特徴</li>
                <li>メリット / デメリット</li>
                <li>採用した場合の注意点</li>
              </ul>
            </div>
            <div class="compare-card">
              <span class="compare-card__tag">Right Option</span>
              <h3>右側に置く内容</h3>
              <ul>
                <li>案 B の特徴</li>
                <li>メリット / デメリット</li>
                <li>採用した場合の注意点</li>
              </ul>
            </div>
          </div>
        </section>
        <footer class="slide__footer">
          <span>slides/engineer/06-comparison-horizontal.html</span>
          <span class="page-number">06 / 35</span>
        </footer>
      </div>
    </main>
  </body>
</html>
