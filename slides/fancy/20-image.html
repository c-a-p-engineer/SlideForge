<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fancy Image</title>
    <style>
      @page {
        size: 1920px 1080px;
        margin: 0;
      }
    </style>
    <link rel="stylesheet" href="../base.css" />
    <link rel="stylesheet" href="./theme.css" />
  </head>
  <body>
    <main class="slide" data-slide-type="appendix" data-slide-variant="default">
      <div class="slide__shell">
        <header class="slide__header">
          <div class="brand">SlideForge / Fancy</div>
          <div class="slide-id">Image</div>
        </header>
        <section class="slide__body">
          <p class="kicker">このページは何用か</p>
          <h1 class="title">画面や図版を見せる image ページ</h1>
          <p class="purpose-note">用途: テキストだけでは伝わりにくい内容を補う</p>
          <div class="image-layout">
            <div class="media-card">
              <img class="visual visual--tall" src="../assets/placeholder-visual.svg" alt="Placeholder visual" />
            </div>
            <div class="card">
              <h3>向いている場面</h3>
              <p>プロダクト画面、ワイヤー、導入後イメージ、補足図版などを置くときに使います。</p>
            </div>
          </div>
        </section>
        <footer class="slide__footer">
          <span>slides/fancy/20-image.html</span>
          <span class="page-number">20 / 35</span>
        </footer>
      </div>
    </main>
  </body>
</html>
