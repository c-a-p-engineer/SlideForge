<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fancy Two Column</title>
    <style>
      @page {
        size: 1920px 1080px;
        margin: 0;
      }
    </style>
    <link rel="stylesheet" href="../templates/base/base.css" />
    <link rel="stylesheet" href="../templates/fancy/theme.css" />
  </head>
  <body>
    <main class="slide" data-slide-type="appendix" data-slide-variant="two-column">
      <div class="slide__shell">
        <header class="slide__header">
          <div class="brand">SlideForge / Fancy</div>
          <div class="slide-id">2 Column</div>
        </header>
        <section class="slide__body">
          <p class="kicker">このページは何用か</p>
          <h1 class="title">2 つの論点や選択肢を並べる 2column ページ</h1>
          <p class="purpose-note">用途: 左右比較や役割分担を並列で見せる</p>
          <div class="two-column">
            <div class="panel">
              <h3>左側に置く内容</h3>
              <p>現状案、代替案、担当 A、入力側など、基準となる情報を置きます。</p>
            </div>
            <div class="panel">
              <h3>右側に置く内容</h3>
              <p>比較対象、改善案、担当 B、出力側など、対になる情報を置きます。</p>
            </div>
          </div>
        </section>
        <footer class="slide__footer">
          <span>slides/fancy/22-layout-2column.html</span>
          <span class="page-number">22 / 35</span>
        </footer>
      </div>
    </main>
  </body>
</html>
