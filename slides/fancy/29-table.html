<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fancy Table</title>
    <style>
      @page {
        size: 1920px 1080px;
        margin: 0;
      }
    </style>
    <link rel="stylesheet" href="../templates/base/base.css" />
    <link rel="stylesheet" href="../templates/fancy/theme.css" />
  </head>
  <body>
    <main class="slide" data-slide-type="appendix" data-slide-variant="default">
      <div class="slide__shell">
        <header class="slide__header">
          <div class="brand">SlideForge / Fancy</div>
          <div class="slide-id">Table</div>
        </header>
        <section class="slide__body">
          <p class="kicker">このページは何用か</p>
          <h1 class="title">評価条件や比較一覧を圧縮する table ページ</h1>
          <p class="purpose-note">用途: 比較軸が多いときに一覧化する</p>
          <div class="table-card">
            <table>
              <thead>
                <tr>
                  <th>Type</th>
                  <th>When To Use</th>
                  <th>Main Value</th>
                  <th>Typical Position</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>problem</td>
                  <td>課題導入</td>
                  <td>問題の明確化</td>
                  <td>序盤</td>
                </tr>
                <tr>
                  <td>comparison</td>
                  <td>選択肢比較</td>
                  <td>評価しやすさ</td>
                  <td>中盤</td>
                </tr>
                <tr>
                  <td>decision</td>
                  <td>結論提示</td>
                  <td>会議の着地点明示</td>
                  <td>終盤</td>
                </tr>
                <tr>
                  <td>action</td>
                  <td>実行計画</td>
                  <td>次アクション明示</td>
                  <td>最後</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
        <footer class="slide__footer">
          <span>slides/fancy/29-table.html</span>
          <span class="page-number">29 / 35</span>
        </footer>
      </div>
    </main>
  </body>
</html>
