<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fancy One Column</title>
    <style>
      @page {
        size: 1920px 1080px;
        margin: 0;
      }
    </style>
    <link rel="stylesheet" href="../base.css" />
    <link rel="stylesheet" href="./theme.css" />
  </head>
  <body>
    <main class="slide" data-slide-type="appendix" data-slide-variant="one-column">
      <div class="slide__shell">
        <header class="slide__header">
          <div class="brand">SlideForge / Fancy</div>
          <div class="slide-id">1 Column</div>
        </header>
        <section class="slide__body">
          <p class="kicker">このページは何用か</p>
          <h1 class="title">長めの説明を流れよく読ませる 1column ページ</h1>
          <p class="purpose-note">用途: 方針整理や前提説明を視線移動少なく読ませる</p>
          <div class="panel">
            <h3>使いどころ</h3>
            <p>導入方針、設計方針、背景整理など、比較よりも説明の流れを優先したいときに使います。</p>
          </div>
          <div class="metrics">
            <div class="card">
              <span class="label">Background</span>
              <p>背景説明</p>
            </div>
            <div class="card">
              <span class="label">Policy</span>
              <p>判断基準</p>
            </div>
            <div class="card">
              <span class="label">Outcome</span>
              <p>結論</p>
            </div>
          </div>
        </section>
        <footer class="slide__footer">
          <span>slides/fancy/21-layout-1column.html</span>
          <span class="page-number">21 / 35</span>
        </footer>
      </div>
    </main>
  </body>
</html>
