<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobile KPI CTA</title>
    <style>
      @page {
        size: 1080px 1920px;
        margin: 0;
      }
    </style>
    <link rel="stylesheet" href="../templates/base/base.css" />
    <link rel="stylesheet" href="../templates/mobile/theme.css" />
  </head>
  <body>
    <main class="slide" data-slide-type="evidence" data-slide-variant="default">
      <div class="slide__shell">
        <header class="slide__header">
          <div class="brand">SlideForge / Mobile</div>
          <div class="slide-id">Mobile KPI CTA</div>
        </header>
        <section class="slide__body">
          <p class="kicker">このページは何用か</p>
          <h1 class="title">数字と行動喚起を最後に置く kpi / cta ページ</h1>
          <p class="purpose-note">用途: 成果の提示と次の行動を 1 枚にまとめる</p>
          <div class="card-stack">
            <div class="metric-card">
              <span class="label">Reach</span>
              <div class="metric-card__value">3.2x</div>
              <p>スマホ向け縦型サンプルは SNS 掲載や LP 冒頭の見せ方確認に向きます。</p>
            </div>
            <div class="card">
              <h3>Next Action</h3>
              <p>slideforge render --input ./slides/mobile --format png --preset mobile のように指定して、そのまま画像を書き出せます。</p>
            </div>
          </div>
        </section>
        <footer class="slide__footer">
          <span>slides/mobile/05-kpi-cta.html</span>
          <span class="page-number">05 / 5</span>
        </footer>
      </div>
    </main>
  </body>
</html>
