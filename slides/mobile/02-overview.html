<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobile Overview</title>
    <style>
      @page {
        size: 1080px 1920px;
        margin: 0;
      }
    </style>
    <link rel="stylesheet" href="../templates/base/base.css" />
    <link rel="stylesheet" href="../templates/mobile/theme.css" />
  </head>
  <body>
    <main class="slide" data-slide-type="appendix" data-slide-variant="default">
      <div class="slide__shell">
        <header class="slide__header">
          <div class="brand">SlideForge / Mobile</div>
          <div class="slide-id">Mobile Overview</div>
        </header>
        <section class="slide__body">
          <p class="kicker">このページは何用か</p>
          <h1 class="title">画面全体の要点を 3 つ程度で見せる overview ページ</h1>
          <p class="purpose-note">用途: スマホ向け資料の冒頭で、何を見せるのかを短く共有する</p>
          <div class="card-stack">
            <div class="metric-card">
              <span class="label">Point 1</span>
              <div class="metric-card__value">短文</div>
              <p>1 ブロック 2 行から 3 行までに抑えると視認性が安定します。</p>
            </div>
            <div class="metric-card">
              <span class="label">Point 2</span>
              <div class="metric-card__value">縦積み</div>
              <p>左右比較より、上から順に理解できる構成のほうがスマホでは強いです。</p>
            </div>
            <div class="metric-card">
              <span class="label">Point 3</span>
              <div class="metric-card__value">CTA</div>
              <p>最後に行動を置くと、縦スクロールと相性が良くなります。</p>
            </div>
          </div>
        </section>
        <footer class="slide__footer">
          <span>slides/mobile/02-overview.html</span>
          <span class="page-number">02 / 5</span>
        </footer>
      </div>
    </main>
  </body>
</html>
