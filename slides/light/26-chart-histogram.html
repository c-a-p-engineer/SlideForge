<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ライト 処理時間の分布</title>
    <style>@page { size: 1920px 1080px; margin: 0; }</style>
    <link rel="stylesheet" href="../base.css" />
    <link rel="stylesheet" href="./theme.css" />
  </head>
  <body>
    <main class="slide" data-theme="light" data-slide-type="chart-histogram" data-slide-variant="histogram">
      <div class="slide__shell">
        <header class="slide__header">
          <div class="brand">テンプレートサンプル</div>
          <div class="slide-id">26</div>
        </header>
        <section class="slide__body">
          <p class="kicker">明るい背景で読みやすい標準サンプル</p>
          <h1 class="title">処理時間の分布</h1>
          <p class="lead">ヒストグラム: 分布の山と偏りを見る</p>
          <div class="chart-layout"><svg class="chart-svg" viewBox="0 0 760 430" role="img" aria-label="ヒストグラム">
    <line class="axis" x1="80" y1="350" x2="700" y2="350"/><line class="axis" x1="80" y1="70" x2="80" y2="350"/>
    <rect class="bar" x="120" y="290" width="52" height="60"/><rect class="bar" x="188" y="240" width="52" height="110"/><rect class="bar" x="256" y="170" width="52" height="180"/><rect class="bar" x="324" y="100" width="52" height="250"/><rect class="bar" x="392" y="145" width="52" height="205"/><rect class="bar" x="460" y="200" width="52" height="150"/><rect class="bar" x="528" y="255" width="52" height="95"/><rect class="bar" x="596" y="295" width="52" height="55"/>
  </svg><div class="panel"><h2>分布を見る</h2><p>平均値だけでは見えない偏りや山の位置を確認します。</p></div></div>
        </section>
        <footer class="slide__footer">
          <span>chart-histogram</span>
          <span>26 / 27</span>
        </footer>
      </div>
    </main>
  </body>
</html>
