<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ライト 利用時間と満足度</title>
    <style>@page { size: 1920px 1080px; margin: 0; }</style>
    <link rel="stylesheet" href="../base.css" />
    <link rel="stylesheet" href="./theme.css" />
  </head>
  <body>
    <main class="slide" data-theme="light" data-slide-type="chart-scatter" data-slide-variant="scatter">
      <div class="slide__shell">
        <header class="slide__header">
          <div class="brand">テンプレートサンプル</div>
          <div class="slide-id">24</div>
        </header>
        <section class="slide__body">
          <p class="kicker">明るい背景で読みやすい標準サンプル</p>
          <h1 class="title">利用時間と満足度</h1>
          <p class="lead">散布図: 2指標の関係を見る</p>
          <div class="chart-layout"><svg class="chart-svg" viewBox="0 0 760 430" role="img" aria-label="散布図">
    <line class="axis" x1="80" y1="350" x2="700" y2="350"/><line class="axis" x1="80" y1="70" x2="80" y2="350"/>
    <circle class="scatter-point" cx="140" cy="300" r="12"/><circle class="scatter-point" cx="190" cy="255" r="12"/><circle class="scatter-point" cx="230" cy="285" r="12"/><circle class="scatter-point" cx="285" cy="220" r="12"/><circle class="scatter-point" cx="330" cy="245" r="12"/><circle class="scatter-point" cx="390" cy="190" r="12"/><circle class="scatter-point" cx="450" cy="175" r="12"/><circle class="scatter-point" cx="505" cy="145" r="12"/><circle class="scatter-point" cx="570" cy="160" r="12"/><circle class="scatter-point" cx="625" cy="105" r="12"/>
  </svg><div class="panel"><h2>相関を見る</h2><p>外れ値やクラスタが見えるよう、点の重なりを避けます。</p></div></div>
        </section>
        <footer class="slide__footer">
          <span>chart-scatter</span>
          <span>24 / 27</span>
        </footer>
      </div>
    </main>
  </body>
</html>
