<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ライト 導入スケジュール</title>
    <style>@page { size: 1920px 1080px; margin: 0; }</style>
    <link rel="stylesheet" href="../base.css" />
    <link rel="stylesheet" href="./theme.css" />
  </head>
  <body>
    <main class="slide" data-theme="light" data-slide-type="gantt" data-slide-variant="default">
      <div class="slide__shell">
        <header class="slide__header">
          <div class="brand">テンプレートサンプル</div>
          <div class="slide-id">12</div>
        </header>
        <section class="slide__body">
          <p class="kicker">明るい背景で読みやすい標準サンプル</p>
          <h1 class="title">導入スケジュール</h1>
          <p class="lead">ガント: 期間と担当を横棒で示す</p>
          <div class="gantt">
    <div class="gantt-row"><strong>要件整理</strong><span>4/20</span><i style="--start:8;--width:28;"></i></div><div class="gantt-row"><strong>テンプレ整備</strong><span>5/01</span><i style="--start:24;--width:36;"></i></div><div class="gantt-row"><strong>試験運用</strong><span>5/15</span><i style="--start:46;--width:34;"></i></div><div class="gantt-row"><strong>本番判断</strong><span>6/01</span><i style="--start:74;--width:18;"></i></div>
  </div>
        </section>
        <footer class="slide__footer">
          <span>gantt</span>
          <span>12 / 27</span>
        </footer>
      </div>
    </main>
  </body>
</html>
