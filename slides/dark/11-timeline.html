<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ダーク リリースまでの時系列</title>
    <style>@page { size: 1920px 1080px; margin: 0; }</style>
    <link rel="stylesheet" href="../base.css" />
    <link rel="stylesheet" href="./theme.css" />
  </head>
  <body>
    <main class="slide" data-theme="dark" data-slide-type="timeline" data-slide-variant="default">
      <div class="slide__shell">
        <header class="slide__header">
          <div class="brand">テンプレートサンプル</div>
          <div class="slide-id">11</div>

          <h1 class="title">リリースまでの時系列</h1>
          <p class="lead">タイムライン: 日付と節目を横方向に並べる</p>
          <div class="timeline">
    <div class="time-item"><span>4/20</span><strong>要件確認</strong><p>対象チャネルを決める</p></div><div class="time-item"><span>5/01</span><strong>試験開始</strong><p>回答候補を出す</p></div><div class="time-item"><span>5/15</span><strong>中間確認</strong><p>精度と時間を確認</p></div><div class="time-item"><span>6/01</span><strong>本番判断</strong><p>継続可否を決める</p></div>
  </div>
        </section>
        <footer class="slide__footer">
          <span>timeline</span>
          <span>11 / 27</span>
        </footer>
      </div>
    </main>
  </body>
</html>
