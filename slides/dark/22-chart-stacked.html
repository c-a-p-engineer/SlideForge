<!DOCTYPE html>
<html lang="ja">
  <head>

  <body>
    <main class="slide" data-theme="dark" data-slide-type="chart-stacked" data-slide-variant="stacked">

          <div class="slide-id">22</div>

          <p class="kicker">暗い背景で画面共有しやすいサンプル</p>

          <p class="lead">積み上げ: 合計と内訳を同時に見る</p>

    <text x="80" y="126">Q1</text><rect class="stack-a" x="160" y="90" width="260" height="46"/><rect class="stack-b" x="420" y="90" width="180" height="46"/><rect class="stack-c" x="600" y="90" width="130" height="46"/><text x="80" y="206">Q2</text><rect class="stack-a" x="160" y="170" width="300" height="46"/><rect class="stack-b" x="460" y="170" width="210" height="46"/><rect class="stack-c" x="670" y="170" width="175" height="46"/><text x="80" y="286">Q3</text><rect class="stack-a" x="160" y="250" width="340" height="46"/><rect class="stack-b" x="500" y="250" width="240" height="46"/><rect class="stack-c" x="740" y="250" width="220" height="46"/>
  </svg><p class="chart-note">合計値を比較しながら、どの要素が増減したかを確認します。</p></div>
        </section>
        <footer class="slide__footer">
          <span>chart-stacked</span>
          <span>22 / 27</span>
        </footer>
      </div>
    </main>
  </body>
</html>
