<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ダーク 問い合わせ内訳</title>
    <style>@page { size: 1920px 1080px; margin: 0; }</style>
    <link rel="stylesheet" href="../base.css" />
    <link rel="stylesheet" href="./theme.css" />
  </head>
  <body>
    <main class="slide" data-theme="dark" data-slide-type="chart-pie" data-slide-variant="pie">
      <div class="slide__shell">
        <header class="slide__header">
          <div class="brand">テンプレートサンプル</div>
          <div class="slide-id">21</div>
        </header>
        <section class="slide__body">
          <p class="kicker">暗い背景で画面共有しやすいサンプル</p>
          <h1 class="title">問い合わせ内訳</h1>
          <p class="lead">円グラフ: 全体に対する構成比を見る</p>
          <div class="chart-layout"><svg class="chart-svg" viewBox="0 0 760 430" role="img" aria-label="円グラフ">
    <circle class="donut-track" cx="250" cy="215" r="120"/>
    <circle class="donut-a" cx="250" cy="215" r="120"/>
    <circle class="donut-b" cx="250" cy="215" r="120"/>
    <circle class="donut-c" cx="250" cy="215" r="120"/>
    <circle class="donut-hole" cx="250" cy="215" r="74"/>
    <text class="donut-text" x="250" y="225">52%</text>
    <text x="460" y="160">既存 52%</text><text x="460" y="220">新規 31%</text><text x="460" y="280">調整 17%</text>
  </svg><div class="panel"><h2>構成比</h2><p>内訳は凡例に分け、中心には最も重要な比率を表示します。</p></div></div>
        </section>
        <footer class="slide__footer">
          <span>chart-pie</span>
          <span>21 / 27</span>
        </footer>
      </div>
    </main>
  </body>
</html>
