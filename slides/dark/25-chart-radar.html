<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ダーク 機能評価のバランス</title>
    <style>@page { size: 1920px 1080px; margin: 0; }</style>
    <link rel="stylesheet" href="../base.css" />
    <link rel="stylesheet" href="./theme.css" />
  </head>
  <body>
    <main class="slide" data-theme="dark" data-slide-type="chart-radar" data-slide-variant="radar">
      <div class="slide__shell">
        <header class="slide__header">
          <div class="brand">テンプレートサンプル</div>
          <div class="slide-id">25</div>
        </header>
        <section class="slide__body">
          <p class="kicker">暗い背景で画面共有しやすいサンプル</p>
          <h1 class="title">機能評価のバランス</h1>
          <p class="lead">レーダー: 複数指標の強弱を見る</p>
          <div class="chart-layout"><svg class="chart-svg" viewBox="0 0 760 430" role="img" aria-label="レーダーチャート">
    <polygon class="radar-grid" points="380,70 520,170 465,325 295,325 240,170"/>
    <polygon class="radar-grid" points="380,125 465,185 430,280 330,280 295,185"/>
    <polygon class="radar-area" points="380,95 500,178 430,292 315,300 270,175"/>
    <text x="370" y="50">A</text><text x="535" y="174">B</text><text x="465" y="355">C</text><text x="270" y="355">D</text><text x="210" y="174">E</text>
  </svg><div class="panel"><h2>複数軸の比較</h2><p>強みと弱みの輪郭を短時間で把握できます。</p></div></div>
        </section>
        <footer class="slide__footer">
          <span>chart-radar</span>
          <span>25 / 27</span>
        </footer>
      </div>
    </main>
  </body>
</html>
