<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ダーク 想定質問と回答</title>
    <style>@page { size: 1920px 1080px; margin: 0; }</style>
    <link rel="stylesheet" href="../base.css" />
    <link rel="stylesheet" href="./theme.css" />
  </head>
  <body>
    <main class="slide" data-theme="dark" data-slide-type="faq" data-slide-variant="default">
      <div class="slide__shell">
        <header class="slide__header">
          <div class="brand">テンプレートサンプル</div>
          <div class="slide-id">17</div>
        </header>
        <section class="slide__body">
          <p class="kicker">暗い背景で画面共有しやすいサンプル</p>
          <h1 class="title">想定質問と回答</h1>
          <p class="lead">Q&A: 懸念に短く答える</p>
          <div class="faq-grid">
    <div class="qa"><h2>Q. テーマで構造は変わる?</h2><p>A. 変えません。見た目だけを差し替えます。</p></div>
    <div class="qa"><h2>Q. グラフはどこに入る?</h2><p>A. chart 系ページとして独立して確認します。</p></div>
    <div class="qa"><h2>Q. 出力確認は?</h2><p>A. render:all でPNGとPDFを書き出します。</p></div>
  </div>
        </section>
        <footer class="slide__footer">
          <span>faq</span>
          <span>17 / 27</span>
        </footer>
      </div>
    </main>
  </body>
</html>
