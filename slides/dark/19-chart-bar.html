<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ダーク 部門別の対応件数</title>
    <style>@page { size: 1920px 1080px; margin: 0; }</style>
    <link rel="stylesheet" href="../base.css" />
    <link rel="stylesheet" href="./theme.css" />
  </head>
  <body>
    <main class="slide" data-theme="dark" data-slide-type="chart-bar" data-slide-variant="bar">
      <div class="slide__shell">
        <header class="slide__header">
          <div class="brand">テンプレートサンプル</div>
          <div class="slide-id">19</div>
        </header>
        <section class="slide__body">
          <p class="kicker">暗い背景で画面共有しやすいサンプル</p>
          <h1 class="title">部門別の対応件数</h1>
          <p class="lead">棒グラフ: カテゴリごとの量を比較する</p>
          <div class="chart-layout"><svg class="chart-svg" viewBox="0 0 760 430" role="img" aria-label="棒グラフ">
    <line class="axis" x1="90" y1="350" x2="700" y2="350"/><line class="axis" x1="90" y1="60" x2="90" y2="350"/>
    <rect class="bar" x="92" y="140" width="82" height="210"/><text x="133" y="390">A</text><rect class="bar" x="232" y="200" width="82" height="150"/><text x="273" y="390">B</text><rect class="bar" x="372" y="80" width="82" height="270"/><text x="413" y="390">C</text><rect class="bar" x="512" y="160" width="82" height="190"/><text x="553" y="390">D</text>
  </svg><div class="panel"><h2>カテゴリ比較</h2><p>横軸に項目、縦軸に値を置き、差がすぐ分かるようにします。</p></div></div>
        </section>
        <footer class="slide__footer">
          <span>chart-bar</span>
          <span>19 / 27</span>
        </footer>
      </div>
    </main>
  </body>
</html>
