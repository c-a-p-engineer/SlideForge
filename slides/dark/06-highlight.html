<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ダーク 最重要KPIを強調</title>
    <style>@page { size: 1920px 1080px; margin: 0; }</style>
    <link rel="stylesheet" href="../base.css" />
    <link rel="stylesheet" href="./theme.css" />
  </head>
  <body>
    <main class="slide" data-theme="dark" data-slide-type="highlight" data-slide-variant="default">
      <div class="slide__shell">
        <header class="slide__header">
          <div class="brand">テンプレートサンプル</div>
          <div class="slide-id">06</div>
        </header>
        <section class="slide__body">
          <p class="kicker">暗い背景で画面共有しやすいサンプル</p>
          <h1 class="title">最重要KPIを強調</h1>
          <p class="lead">強調: 数値を大きく、説明を短くする</p>
          <div class="highlight-grid">
    <div class="stat"><span>目標短縮</span><strong>30%</strong><em>初回返信時間</em></div>
    <div class="stat"><span>開始範囲</span><strong>3</strong><em>主要チャネル</em></div>
    <div class="stat"><span>検証期間</span><strong>4週</strong><em>小さく開始</em></div>
  </div>
        </section>
        <footer class="slide__footer">
          <span>highlight</span>
          <span>06 / 27</span>
        </footer>
      </div>
    </main>
  </body>
</html>
