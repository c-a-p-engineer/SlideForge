<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Theme Sample</title>
    <style>
      @page {
        size: 1920px 1080px;
        margin: 0;
      }
    </style>
    <link rel="stylesheet" href="../templates/base/base.css" />
    <link rel="stylesheet" href="../templates/book/theme.css" />
  </head>
  <body>
    <main class="slide" data-slide-type="sample" data-slide-variant="default-book-theme">
      <div class="slide__shell">
        <section class="slide__body full-height">
          <h1 class="title">本テーマのデフォルトサンプル</h1>
          <p class="lead">
            本文で使うことを想定した、見出し、長文、強調ボックス、比較カードの基本見本です。
            青を強調色にしつつ、白黒でも差が残るように本文色と境界線で情報の優先度を分けています。
          </p>
          <div class="panel">
            <h3>強調ボックス</h3>
            <p>重要なポイント、補足説明、章の要約などを入れるための標準スタイルです。</p>
          </div>
          <div class="compare-grid">
            <div class="compare-card">
              <span class="compare-card__tag">Sample A</span>
              <h3>比較カード A</h3>
              <ul>
                <li>主張を短い箇条書きで並べる</li>
                <li>白黒でも境界線で読める</li>
                <li>本文とカードの役割を分けやすい</li>
              </ul>
            </div>
            <div class="compare-card">
              <span class="compare-card__tag">Sample B</span>
              <h3>比較カード B</h3>
              <ul>
                <li>強調色は青だけに絞る</li>
                <li>補助情報は線と余白で整理する</li>
                <li>書籍向けにページ番号は出さない</li>
              </ul>
            </div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
