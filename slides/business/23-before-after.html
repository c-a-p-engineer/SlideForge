<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Business Before After</title>
    <style>
      @page {
        size: 1920px 1080px;
        margin: 0;
      }
    </style>
    <link rel="stylesheet" href="../templates/base/base.css" />
    <link rel="stylesheet" href="../templates/business/theme.css" />
  </head>
  <body>
    <main class="slide" data-slide-type="comparison" data-slide-variant="before-after">
      <div class="slide__shell">
        <header class="slide__header">
          <div class="brand">SlideForge / Business</div>
          <div class="slide-id">Before / After</div>
        </header>
        <section class="slide__body">
          <p class="kicker">このページは何用か</p>
          <h1 class="title">導入前後の変化を明快に見せる before-after ページ</h1>
          <p class="purpose-note">用途: 改善の意味を直感的に伝える</p>
          <div class="compare-grid">
            <div class="compare-card">
              <span class="compare-card__tag">Before</span>
              <ul>
                <li>資料構成が毎回変わる</li>
                <li>レビューコメントが広がる</li>
                <li>会議直前に修正が増える</li>
              </ul>
            </div>
            <div class="compare-card">
              <span class="compare-card__tag">After</span>
              <ul>
                <li>必要な role が最初から入る</li>
                <li>レビュー観点が整理される</li>
                <li>意思決定ページが抜けなく揃う</li>
              </ul>
            </div>
          </div>
        </section>
        <footer class="slide__footer">
          <span>slides/business/23-before-after.html</span>
          <span class="page-number">23 / 35</span>
        </footer>
      </div>
    </main>
  </body>
</html>
