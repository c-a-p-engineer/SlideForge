<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Business KPI Detailed</title>
    <style>
      @page {
        size: 1920px 1080px;
        margin: 0;
      }
    </style>
    <link rel="stylesheet" href="../templates/base/base.css" />
    <link rel="stylesheet" href="../templates/business/theme.css" />
  </head>
  <body>
    <main class="slide" data-slide-type="evidence" data-slide-variant="detailed">
      <div class="slide__shell">
        <header class="slide__header">
          <div class="brand">SlideForge / Business</div>
          <div class="slide-id">KPI Detailed</div>
        </header>
        <section class="slide__body">
          <p class="kicker">このページは何用か</p>
          <h1 class="title">目標値と実績値を説明する kpi-detailed ページ</h1>
          <p class="purpose-note">用途: target / actual の差や根拠を示す</p>
          <div class="evidence-grid">
            <div class="table-card">
              <table>
                <thead>
                  <tr>
                    <th>Metric</th>
                    <th>Target</th>
                    <th>Actual</th>
                    <th>Meaning</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>初稿時間</td>
                    <td>1.5日</td>
                    <td>1.3日</td>
                    <td>達成</td>
                  </tr>
                  <tr>
                    <td>レビュー回数</td>
                    <td>2回</td>
                    <td>2回</td>
                    <td>達成</td>
                  </tr>
                  <tr>
                    <td>再利用率</td>
                    <td>60%</td>
                    <td>68%</td>
                    <td>達成</td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div class="panel">
              <h3>使いどころ</h3>
              <p>数字の見せ方だけでなく、目標との関係や達成度の意味まで説明したいときに使います。</p>
            </div>
          </div>
        </section>
        <footer class="slide__footer">
          <span>slides/business/12-kpi-detailed.html</span>
          <span class="page-number">12 / 35</span>
        </footer>
      </div>
    </main>
  </body>
</html>
