<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Business Trade-off</title>
    <style>
      @page {
        size: 1920px 1080px;
        margin: 0;
      }
    </style>
    <link rel="stylesheet" href="../base.css" />
    <link rel="stylesheet" href="./theme.css" />
  </head>
  <body>
    <main class="slide" data-slide-type="decision" data-slide-variant="default">
      <div class="slide__shell">
        <header class="slide__header">
          <div class="brand">SlideForge / Business</div>
          <div class="slide-id">Trade-off</div>
        </header>
        <section class="slide__body">
          <p class="kicker">このページは何用か</p>
          <h1 class="title">得られるものと失うものを説明する trade-off ページ</h1>
          <p class="purpose-note">用途: 完璧な解決ではないことを正直に示す</p>
          <div class="compare-grid">
            <div class="compare-card">
              <span class="compare-card__tag">Gain</span>
              <ul>
                <li>導入で改善できる点</li>
                <li>意思決定が速くなる点</li>
                <li>再利用しやすくなる点</li>
              </ul>
            </div>
            <div class="compare-card">
              <span class="compare-card__tag">Cost</span>
              <ul>
                <li>自由度が下がる部分</li>
                <li>保守が必要になる部分</li>
                <li>例外判断が必要なケース</li>
              </ul>
            </div>
          </div>
        </section>
        <footer class="slide__footer">
          <span>slides/business/07-trade-off.html</span>
          <span class="page-number">07 / 35</span>
        </footer>
      </div>
    </main>
  </body>
</html>
