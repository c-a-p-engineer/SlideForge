<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Business Problem</title>
    <style>
      @page {
        size: 1920px 1080px;
        margin: 0;
      }
    </style>
    <link rel="stylesheet" href="../templates/base/base.css" />
    <link rel="stylesheet" href="../templates/business/theme.css" />
  </head>
  <body>
    <main class="slide" data-slide-type="problem" data-slide-variant="default">
      <div class="slide__shell">
        <header class="slide__header">
          <div class="brand">SlideForge / Business</div>
          <div class="slide-id">Problem</div>
        </header>
        <section class="slide__body">
          <p class="kicker">このページは何用か</p>
          <h1 class="title">問題提起をするときに使う problem ページ</h1>
          <p class="purpose-note">用途: まず何が問題なのかを読み手に共有する</p>
          <div class="section-grid">
            <div class="compare-card">
              <span class="compare-card__tag">Problem</span>
              <h3>載せる内容の例</h3>
              <ul class="problem-list">
                <li>現場で起きている具体的な困りごと</li>
                <li>放置した場合の影響</li>
                <li>なぜ今取り上げる必要があるか</li>
              </ul>
            </div>
            <div class="card-stack">
              <div class="metric-card">
                <span class="label">Point</span>
                <div class="metric-card__value">課題</div>
                <p>数字よりも論点整理を優先する導入ページです</p>
              </div>
              <div class="metric-card">
                <span class="label">When To Use</span>
                <div class="metric-card__value">冒頭</div>
                <p>背景説明より先に、問題を明確にしたいときに使います</p>
              </div>
            </div>
          </div>
        </section>
        <footer class="slide__footer">
          <span>slides/business/02-problem.html</span>
          <span class="page-number">02 / 35</span>
        </footer>
      </div>
    </main>
  </body>
</html>
